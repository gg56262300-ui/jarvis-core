<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>Robert — Jarvis</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e8e8e8;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 16px;
      background: #1a1d27;
      border-bottom: 1px solid #2a2d3a;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    body.pending header {
      background: #2a1630;
      border-bottom-color: #4c1d95;
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }

    /**
     * Hääle keel: RU vasakul, ET paremal — liugur nagu lüliti (aktiivne pool eredam).
     */
    .lang-slide-wrap {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    .lang-slide-side {
      border: none;
      background: none;
      padding: 0 2px;
      margin: 0;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.02em;
      cursor: pointer;
      line-height: 1;
      min-width: 1.25rem;
      text-align: center;
      transition: opacity 0.22s ease, color 0.22s ease, transform 0.22s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }

    .lang-slide-wrap.speech-lang--ru .lang-slide-side.ru {
      opacity: 1;
      color: #f8fafc;
      transform: scale(1.05);
    }

    .lang-slide-wrap.speech-lang--ru .lang-slide-side.et {
      opacity: 0.38;
      color: #64748b;
    }

    .lang-slide-wrap.speech-lang--et .lang-slide-side.et {
      opacity: 1;
      color: #f8fafc;
      transform: scale(1.05);
    }

    .lang-slide-wrap.speech-lang--et .lang-slide-side.ru {
      opacity: 0.38;
      color: #64748b;
    }

    .lang-slide-track {
      position: relative;
      width: 50px;
      height: 28px;
      border-radius: 999px;
      border: 1px solid #334155;
      background: linear-gradient(180deg, #151821 0%, #0c0e14 100%);
      padding: 0;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .lang-slide-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(165deg, #a5b4fc 0%, #6c63ff 55%, #4f46e5 100%);
      box-shadow:
        0 2px 8px rgba(79, 70, 229, 0.55),
        0 0 0 1px rgba(255, 255, 255, 0.12) inset;
      transition: transform 0.26s cubic-bezier(0.34, 1.2, 0.64, 1);
      pointer-events: none;
    }

    .lang-slide-wrap.speech-lang--et .lang-slide-thumb {
      transform: translateX(22px);
    }

    /** Väikesed ringid: sees = eredam, väljas = endiselt selgelt nähtav */
    .header-icon-btn {
      width: 38px;
      height: 38px;
      min-width: 38px;
      border-radius: 50%;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #5b6478;
      background: #1f2230;
      color: #e2e8f0;
      cursor: pointer;
      opacity: 0.95;
      transition: opacity 0.2s, border-color 0.2s, box-shadow 0.2s, color 0.2s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }

    .header-icon-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
      pointer-events: none;
    }

    .header-icon-btn.on {
      opacity: 1;
      color: #e8e8e8;
    }

    .header-icon-btn.sound.on {
      border-color: #34d399;
      background: rgba(52, 211, 153, 0.12);
      box-shadow: 0 0 12px rgba(52, 211, 153, 0.35);
    }

    .header-icon-btn.push.on {
      border-color: #60a5fa;
      background: rgba(96, 165, 250, 0.12);
      box-shadow: 0 0 12px rgba(96, 165, 250, 0.35);
    }

    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff, #3ecf8e);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px; color: white;
    }

    .header-info h1 { font-size: 16px; font-weight: 600; }
    .header-info p { font-size: 12px; color: #6b7280; }
    #statusLine.ok { color: #6ee7b7; }
    #statusLine.bad { color: #f87171; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .msg-wrap {
      display: flex;
      max-width: 92%;
      gap: 8px;
      align-items: flex-end;
    }

    .msg-wrap.user {
      align-self: flex-end;
      flex-direction: row-reverse;
      margin-left: auto;
    }

    .msg-wrap.assistant {
      align-self: flex-start;
    }

    .msg-wrap.system {
      align-self: center;
      max-width: 100%;
      justify-content: center;
      gap: 8px;
    }

    .msg-time {
      font-size: 11px;
      color: #6b7280;
      white-space: nowrap;
      flex-shrink: 0;
      line-height: 1.3;
      padding-bottom: 2px;
      max-width: 96px;
      text-align: center;
    }

    .msg-wrap.system .msg-time {
      color: #4b5563;
    }

    .msg {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.5;
      word-break: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: #6c63ff;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .msg.assistant {
      align-self: flex-start;
      background: #1e2130;
      color: #e8e8e8;
      border-bottom-left-radius: 4px;
    }

    .msg.system {
      align-self: center;
      background: transparent;
      color: #4b5563;
      font-size: 12px;
      padding: 4px 0;
    }

    .typing {
      align-self: flex-start;
      background: #1e2130;
      border: 1px solid #3b82f6;
      box-shadow: 0 0 14px rgba(59, 130, 246, 0.35);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
      display: none;
      animation: typingPulse 1.6s ease-in-out infinite;
    }

    .typing span {
      display: inline-block;
      width: 9px; height: 9px;
      background: #93c5fd;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
      margin: 0 3px;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    @keyframes typingPulse {
      0%, 100% { box-shadow: 0 0 10px rgba(59, 130, 246, 0.25); }
      50% { box-shadow: 0 0 18px rgba(59, 130, 246, 0.55); }
    }

    /* Ülemine edenemisriba, et omanik näeks: kanal töötab, päring käib */
    #progressBar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #3b82f6, #22d3ee, #3b82f6);
      background-size: 200% 100%;
      opacity: 0;
      transform: translateZ(0);
      transition: opacity 0.15s ease-in-out;
      pointer-events: none;
      z-index: 9999;
    }
    #progressBar.on {
      opacity: 1;
      animation: progressSlide 1.1s linear infinite;
    }

    @keyframes progressSlide {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    /* Olekurea sära, kui päring käib */
    body.busy #statusLine {
      color: #93c5fd;
    }

    /* Iga kasutajasõnumi enda olekumarker — nähtav vänt/linnuke mulli kõrval */
    .msg-wrap.user {
      position: relative;
    }
    .msg-status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      margin-right: 6px;
      vertical-align: middle;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s, opacity 0.2s;
      flex-shrink: 0;
    }
    .msg-status[data-state="sending"] {
      background: transparent;
      color: #93c5fd;
      border: 2px solid #93c5fd;
      border-top-color: transparent;
      animation: msgSpin 0.9s linear infinite;
      box-shadow: 0 0 10px rgba(147, 197, 253, 0.55);
    }
    .msg-status[data-state="done"] {
      background: #10b981;
      color: #052e16;
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.55);
    }
    .msg-status[data-state="error"] {
      background: #ef4444;
      color: #1c0a00;
      box-shadow: 0 0 10px rgba(239, 68, 68, 0.55);
    }
    @keyframes msgSpin {
      to { transform: rotate(360deg); }
    }

    /* Kasutaja enda mull pulseerib nõrgalt, kuni saabub vastus */
    .msg-wrap.user[data-status="sending"] .msg {
      animation: userMsgPulse 1.2s ease-in-out infinite;
      box-shadow: 0 0 14px rgba(147, 197, 253, 0.45);
    }
    @keyframes userMsgPulse {
      0%, 100% { box-shadow: 0 0 10px rgba(147, 197, 253, 0.35); }
      50% { box-shadow: 0 0 18px rgba(147, 197, 253, 0.7); }
    }

    /* Elava kanali indikaator — alati päises näha. Roheline = ooteseis, sinine + pöörlev = aktiivne päring. */
    .live-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.65);
      animation: livePulse 2s ease-in-out infinite;
      margin-right: 6px;
      flex-shrink: 0;
    }
    body.busy .live-dot {
      background: #3b82f6;
      box-shadow: 0 0 14px rgba(59, 130, 246, 0.8);
      animation: liveSpin 1.1s linear infinite;
    }
    .header-info .status-row {
      display: inline-flex;
      align-items: center;
      gap: 0;
    }
    @keyframes livePulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.25); opacity: 1; }
    }
    @keyframes liveSpin {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.4); }
    }

    .footer-stack {
      --footer-btn: 44px;
      padding: 10px 12px 12px;
      background: #1a1d27;
      border-top: 1px solid #2a2d3a;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .confirm-bar {
      display: none;
      width: 100%;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid #2a2d3a;
      border-radius: 16px;
      background: #0f1117;
      flex-wrap: nowrap;
    }

    .reply-confirm-row {
      display: flex;
      flex-direction: column;
      width: 100%;
      align-items: stretch;
      gap: 6px;
      padding: 4px 2px 2px;
    }

    .reply-confirm-row[hidden] {
      display: none !important;
    }

    .reply-confirm-label {
      font-size: 11px;
      color: #94a3b8;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-right: 4px;
    }

    .reply-confirm-btn {
      width: var(--footer-btn);
      height: var(--footer-btn);
      min-width: var(--footer-btn);
      border-radius: 50%;
      padding: 0;
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .reply-confirm-btn.yes {
      background: #22c55e;
      color: #052e16;
      border-color: #16a34a;
    }

    .reply-confirm-btn.no {
      background: #475569;
      color: #f1f5f9;
      border-color: #64748b;
    }

    .reply-confirm-btn.alt {
      background: #1a1530;
      color: #ddd6fe;
      border-color: #6c63ff;
    }

    .reply-confirm-btn.alt:hover {
      background: #252040;
    }

    .reply-confirm-btns {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      gap: 10px;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    /** Tekst üleval täislaiuses; alumine rida: ✕ | keskel mikrofon | saada (ühesuurused ringid) */
    .footer-compose {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      min-width: 0;
    }

    .footer-controls-row {
      display: flex;
      gap: 8px;
      align-items: center;
      width: 100%;
    }

    .footer-mic-slot {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      min-width: 0;
    }

    /** iOS: emoji asemel SVG, muidu tekstivalik / Kopeeri menüü */
    .footer-round-btn,
    .voice-btn,
    #send {
      width: var(--footer-btn);
      height: var(--footer-btn);
      min-width: var(--footer-btn);
      min-height: var(--footer-btn);
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .footer-round-btn {
      border: 1px solid #2a2d3a;
      background: #0f1117;
      color: #94a3b8;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
    }

    .footer-round-btn svg {
      pointer-events: none;
    }

    .footer-round-btn:hover {
      border-color: #64748b;
      color: #e8e8e8;
    }

    .voice-btn {
      border: 1px solid #2a2d3a;
      background: #0f1117;
      color: #e8e8e8;
      transition: border-color 0.2s, background 0.2s;
    }

    .voice-btn svg,
    .voice-btn .voice-btn-svg {
      pointer-events: none;
      display: block;
    }

    .voice-btn:hover {
      border-color: #6c63ff;
    }

    .voice-btn.listening {
      border-color: #ef4444;
      background: rgba(239, 68, 68, 0.22);
    }

    .voice-live-row {
      display: none;
      width: 100%;
      font-size: 13px;
      line-height: 1.35;
      color: #94a3b8;
      padding: 4px 2px 0;
      min-height: 1.2em;
    }

    .voice-live-row.is-on {
      display: block;
    }

    .voice-live-text {
      color: #cbd5e1;
      word-break: break-word;
    }

    body.chat-reply-confirm-active .footer-compose #input {
      max-width: min(92%, 320px);
      align-self: center;
    }

    .confirm-bar .label {
      flex: 1;
      font-size: 12px;
      color: #cbd5e1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .confirm-btn {
      width: var(--footer-btn);
      height: var(--footer-btn);
      min-width: var(--footer-btn);
      border: 1px solid #2a2d3a;
      background: #1e2130;
      color: #e8e8e8;
      padding: 0;
      border-radius: 50%;
      font-weight: 700;
      cursor: pointer;
      font-size: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .confirm-btn.yes { background: #3ecf8e; color: #0f1117; border-color: #2bbf7b; }
    .confirm-btn.no { background: #ef4444; color: #0f1117; border-color: #dc2626; }
    .confirm-btn:disabled { opacity: 0.6; cursor: default; }

    #input {
      min-width: 0;
      width: 100%;
      box-sizing: border-box;
      background: #0f1117;
      border: 1px solid #2a2d3a;
      border-radius: 20px;
      padding: 10px 16px;
      color: #e8e8e8;
      font-size: 15px;
      resize: none;
      max-height: 120px;
      outline: none;
      line-height: 1.4;
    }

    #input:focus { border-color: #6c63ff; }
    #input::placeholder { color: #4b5563; }

    #send {
      background: #6c63ff;
      border: none;
      transition: background 0.2s;
    }

    #send svg {
      pointer-events: none;
    }

    #send:hover {
      background: #5a52d5;
    }

    #send:disabled {
      background: #2a2d3a;
      cursor: default;
    }

    #send svg {
      fill: white;
    }

    /* Kalendri äratus (kuni Jah / Ei) */
    .cal-alarm-root {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(8, 10, 18, 0.78);
      backdrop-filter: blur(8px);
    }
    .cal-alarm-root[hidden] { display: none !important; }

    .cal-alarm-card {
      max-width: 440px;
      width: 100%;
      border-radius: 26px;
      padding: 26px 22px 20px;
      text-align: center;
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.55);
      animation: calPulse 2.2s ease-in-out infinite;
    }

    @keyframes calPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 28px 70px rgba(0, 0, 0, 0.55); }
      50% { transform: scale(1.02); box-shadow: 0 32px 80px rgba(255, 120, 80, 0.35); }
    }

    .cal-alarm-card.birthday {
      background: linear-gradient(155deg, #fff7e6 0%, #ffb4a8 38%, #ff7eb3 72%, #c084fc 100%);
      color: #1a0a12;
      border: 3px solid rgba(255, 255, 255, 0.95);
    }

    .cal-alarm-card.standard {
      background: linear-gradient(165deg, #0f172a 0%, #7f1d1d 55%, #b45309 100%);
      color: #fffbeb;
      border: 2px solid #fb923c;
    }

    .cal-alarm-eyebrow {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.85;
      margin-bottom: 8px;
    }

    .cal-alarm-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 12px;
      line-height: 1.25;
    }

    .cal-alarm-meta {
      font-size: 13px;
      opacity: 0.88;
      margin-bottom: 18px;
      line-height: 1.45;
    }

    .cal-alarm-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .cal-alarm-btn {
      border: none;
      border-radius: 16px;
      padding: 12px 20px;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      min-width: 120px;
    }

    .cal-alarm-btn.yes {
      background: #22c55e;
      color: #052e16;
    }

    .cal-alarm-btn.no {
      background: #f97316;
      color: #1c0a00;
    }

    .cal-alarm-btn:disabled { opacity: 0.55; cursor: default; }
  </style>
</head>
<body>
  <div id="progressBar" aria-hidden="true"></div>
  <header>
    <div class="avatar">R</div>
    <div class="header-info">
      <h1>Robert</h1>
      <p id="statusLine" class="ok"><span class="status-row"><span class="live-dot" aria-hidden="true"></span><span id="statusLineText">Jarvise assistent · kontrollin ühendust…</span></span></p>
    </div>
    <div class="header-actions">
      <div
        class="lang-slide-wrap speech-lang--et"
        id="speechLangWrap"
        role="group"
        aria-label="Hääletuvastus: RU või ET"
      >
        <button type="button" class="lang-slide-side ru" id="speechLabelRu" title="Vene hääletuvastus">
          RU
        </button>
        <button
          type="button"
          class="lang-slide-track"
          id="speechLangTrack"
          role="switch"
          title="Vaheta keelt"
          aria-label="Hääletuvastus: RU või ET"
          aria-checked="true"
        >
          <span class="lang-slide-thumb" id="speechLangThumb" aria-hidden="true"></span>
        </button>
        <button type="button" class="lang-slide-side et" id="speechLabelEt" title="Eesti hääletuvastus">
          ET
        </button>
      </div>
      <button
        type="button"
        class="header-icon-btn sound"
        id="soundToggle"
        aria-label="Helisignaal"
        title="Helisignaal vestluses"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path

  <script>
    (function channelFallbackBoot() {
      if (!('fetch' in window)) return;

      var bar = document.getElementById('channelFallbackBar');
      var textEl = document.getElementById('channelFallbackText');
      var inputEl = document.getElementById('channelFallbackInput');
      var sendEl = document.getElementById('channelFallbackSend');
      if (!bar || !textEl || !inputEl || !sendEl) return;

      var seen = {};
      var lastShownId = 0;

      function show(text, id) {
        if (typeof id === 'number' && id > lastShownId) lastShownId = id;
        textEl.textContent = text;
        bar.hidden = false;
      }

      function pull() {
        fetch('/api/chat/channel?after=0', { cache: 'no-store' })
          .then(function (res) { return res.ok ? res.json() : null; })
          .then(function (data) {
            if (!data || !Array.isArray(data.messages)) return;
            var latest = null;
            for (var i = 0; i < data.messages.length; i += 1) {
              var m = data.messages[i] || {};
              var id = Number(m.id || 0);
              var from = String(m.from || '');
              var text = String(m.text || '').trim();
              if (!id || !text || from === 'user') continue;
              if (seen[id]) continue;
              seen[id] = 1;
              latest = { id: id, text: text };
            }
            if (latest && latest.id >= lastShownId) show(latest.text, latest.id);
          })
          .catch(function () {});
      }

      function sendReply() {
        var text = String(inputEl.value || '').trim();
        if (!text) return;
        sendEl.disabled = true;
        fetch('/api/chat/channel/user', {
          method: 'POST',
          cache: 'no-store',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: text }),
        })
          .then(function () {
            inputEl.value = '';
            show('Vastus saadetud kanalisse.', lastShownId);
          })
          .catch(function () {
            show('Kanali vastuse saatmine ebaõnnestus.', lastShownId);
          })
          .finally(function () {
            sendEl.disabled = false;
          });
      }

      sendEl.addEventListener('click', sendReply);
      inputEl.addEventListener('keydown', function (ev) {
        if (ev.key === 'Enter') {
          ev.preventDefault();
          sendReply();
        }
      });

      pull();
      setInterval(pull, 3000);
    })();
  </script>

      try {

        return;

      function mark() {
        try {
          localStorage.setItem(key, rev);
        } catch {
          /* ignore */
        }
      }
      if (!('serviceWorker' in navigator)) {
        mark();
        return;

      navigator.serviceWorker.getRegistrations().then(function (regs) {
        var hasCaches = window.caches && typeof caches.keys === 'function';
        if (!regs.length && !hasCaches) {
          mark();
          return;

        mark();
        return Promise.all(regs.map(function (r) {
          return r.unregister();
        })).then(function () {
          if (!hasCaches) return undefined;
          return caches.keys().then(function (keys) {
            return Promise.all(keys.map(function (k) {
              return caches.delete(k);
            }));
          });
        }).then(function () {
          window.location.reload();

    /**
     * Kalendri ainult lugemine / küsimine — ei tohi avada Jah/Ei ohtlikkuse riba.
     * (Nt «все события 17-го», «terve päeva sündmused», «mis on kalendris» polnud kustutus.)
     */
    function calendarMessageLooksLikeReadOnlyInfoQuery(text) {
      const lower = (text || '').toLowerCase();
      if (lower.length < 5) return false;
      if (
        /\b(kustut|tühjend|eemald\w*\s+kõik|удал|очист(ить|и)\s+(весь|все|день)|delete\s+all|empty\s+the|tühjenda\s+kõik|massi\s*kustut|массов\w*\s*удал)\b/i.test(
          lower,
        )
      ) {
        return false;
      }
      return (
        /\b(покажи|посмотри|список|какие|что\s+(в|на)|расскажи|скажи|узнай|записи|запись|записей|информац|прочитай|в\s+календар|по\s+календар|loetle|näita|mis\s+on|millised|kuupäev|kuupäeval|vaata|arvuta|tell\s+me|show|list|what\s+('?s)?\s*(on|in|scheduled))\b/i.test(
          lower,
        ) ||
        /\b(числа?|апрел|мая|июн).{0,40}(событ|запис|календар)/i.test(lower) ||
        /\b(mis\s+sündmused|mis\s+juhtub|kalendris\s+on)\b/i.test(lower)
      );
    }

    /**
     * Masskalendri kustutus / terve päev tühjaks — et, ru, en, es (kasutaja või assistendi tekst).
     * EI kaasa «все события» ainult loetlemisel ega «terve päev» ilma tühjendamiseta.
     */
    function messageImpliesCalendarMassDestructiveIntent(text) {
      const raw = (text || '').trim();
      if (raw.length < 8) return false;
      const lower = raw.toLowerCase();
      if (calendarMessageLooksLikeReadOnlyInfoQuery(raw)) {
        return false;
      }
      return (
        (/\b(kustut|eemald|tühjend|delete|remove|borrar|eliminar|vac[ií]ar|удал|очистить)\w*/i.test(lower) &&
          /\b(kõik|terve|päev|все|всё|цел(ый|ая)|день|events?|sündmus|событ)/i.test(lower)) ||
        /\b(terve|цел(ый|ая))\s+(päev|день).{0,50}(tühi|tühjaks|kustut|пуст|удал|empty)/i.test(lower) ||
        /(päev|день).{0,45}(tühi|tühjaks|пустым|пустой|empty)/i.test(lower) ||
        /(чтобы|et).{0,50}(päev|день).{0,30}(tühi|пустым|пуст)/i.test(lower) ||
        /\b(удал|к\s+удалению|надо\s+удал).{0,90}(все|всех|всё|kõik).{0,50}(события|sündmused|events?)\b/i.test(lower) ||
        /\b(kustut|tühjenda).{0,70}(kõik|terve|все|всё).{0,40}(sündmus|событ|päev|день)?/i.test(lower) ||
        /очист(ить|и).{0,25}(день|календар|päev)/i.test(lower) ||
        /очист(ить|и)\s+весь/i.test(lower) ||
        /(massi|массов).{0,18}(kustut|удал)/i.test(lower) ||
        /\b(delete|bulk)\s+all\b/i.test(lower)
      );
    }

    /**
     * Jah/Ei riba: masskustutus, terve päev jne. Kasutaja sõnumist VÕI assistendi vastusest
     * (kui assistent ei kasutanud õigeid sõnu, tuvastab kasutaja käsu ikkagi).
     */
    function assistantMessageRequiresDestructiveConfirm(text) {
      const raw = (text || '').trim();
      if (raw.length < 12) return false;
      const lower = raw.toLowerCase();

      if (
        /meeldetulet(us|use)|lisa(da)?\s+kalendrisse|uus\s+sündmus|üks(iks)?\s+sündmus/i.test(lower) &&
        !/(kustut|eemald|tühj|kõik\s+(need\s+)?sündmused|terve\s+päev|удал|все\s+событ|пуст)/i.test(lower)
      ) {
        return false;
      }

      return messageImpliesCalendarMassDestructiveIntent(text);
    }

    function showReplyConfirmIfNeeded(assistantText, userText) {
      if (!replyConfirmRowEl) return;
      const userT = typeof userText === 'string' ? userText : '';
      const fromUser = messageImpliesCalendarMassDestructiveIntent(userT);
      const fromAssistant = assistantMessageRequiresDestructiveConfirm(assistantText);
      if (!fromUser && !fromAssistant) {
        hideReplyConfirm();
        return;
      }
      replyConfirmRowEl.hidden = false;
      if (replyConfirmLabelEl) {
        replyConfirmLabelEl.textContent = 'Ohtlik tegevus — kinnita või täpsusta';

    function initSpeechRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) return null;
      const r = new SR();
      r.continuous = true;
      r.interimResults = true;
      r.maxAlternatives = 1;
      r.onresult = (event) => {
        let interim = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const chunk = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            const t = chunk.trim();
            if (t) {
              inputEl.value = (inputEl.value ? `${inputEl.value.trim()} ` : '') + t;
              inputEl.dispatchEvent(new Event('input'));
            }
          } else {
            interim += chunk;
          }
        }
        if (voiceLiveEl) voiceLiveEl.textContent = interim;
        if (voiceLiveLabelEl) {
          voiceLiveLabelEl.textContent = interim.trim() ? 'Pooleli (eelvaade):' : 'Kuulan…';
        }
        setVoiceLiveRowOn(voiceUiActive);
      };
      r.onerror = (ev) => {
        const err = ev.error || '';
        if (err === 'aborted') {
          finishVoiceUi();
          return;
        }
        finishVoiceUi();
        if (err !== 'no-speech' && err !== 'audio-capture') {
          addMsg('assistant', `Häältuvastus peatatud (${err}). Kirjuta käsitsi või proovi uuesti.`);
        }
      };
      r.onend = () => {
        if (!voiceUiActive) {
          finishVoiceUi();
          speechRecognition = initSpeechRecognition();
          return;
        }
        try {
          r.start();
        } catch {
          finishVoiceUi();
          speechRecognition = initSpeechRecognition();
        }
      };
      return r;
    }

    speechRecognition = initSpeechRecognition();

    function syncSpeechLangUi() {
      if (speechLangWrap) {

      if (speechLangTrack) {
        speechLangTrack.setAttribute('aria-checked', speechLang === 'et-EE' ? 'true' : 'false');
      }
      if (voiceBtnEl) {
        const ios = /iPhone|iPad|iPod/i.test(navigator.userAgent || '');
        const iosNoteEt =
          ios
            ? ' iOS küsib mikrofoniluba (süsteemi aken) — seda ei saa veebis ära jätta; lubage üks kord.'
            : '';
        const iosNoteRu =
          ios
            ? ' iOS спрашивает доступ к микрофону (системное окно) — сайт не может убрать это; один раз нажмите «Разрешить».'
            : '';
        voiceBtnEl.title =
          speechLang === 'ru-RU'
            ? `Нажмите для диктовки. Язык: RU ↔ ET сверху.${iosNoteRu}`
            : `Puudutus = alusta kuulamist või peata. Keele lüliti: RU ← → ET ülal.${iosNoteEt}`;
      }
    }

    function setSpeechLang(next) {
      if (next !== 'et-EE' && next !== 'ru-RU') return;
      speechLang = next;
      localStorage.setItem('jarvisSpeechLang', speechLang);
      syncSpeechLangUi();
    }

    if (speechLangTrack) {
      speechLangTrack.addEventListener('click', () => {
        setSpeechLang(speechLang === 'ru-RU' ? 'et-EE' : 'ru-RU');
      });
    }
    if (speechLabelRu) {

    function formatMsgTime(d = new Date()) {
      const value = d instanceof Date ? d : new Date(d);
      return value.toLocaleString('et-EE', { dateStyle: 'short', timeStyle: 'short' });
    }

    function saveChatMessages() {
      try {
        localStorage.setItem(CHAT_CACHE_KEY, JSON.stringify(chatMessages.slice(-CHAT_CACHE_LIMIT)));
      } catch {
        // ignore localStorage failures
      }
    }

    function renderMsg(role, text, at = new Date(), initialStatus = null) {
      const wrap = document.createElement('div');
      wrap.className = `msg-wrap ${role}`;
      const timeEl = document.createElement('span');
      timeEl.className = 'msg-time';
      timeEl.textContent = formatMsgTime(at);
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      wrap.appendChild(timeEl);
      if (role === 'user') {
        const statusEl = document.createElement('span');
        statusEl.className = 'msg-status';
        if (initialStatus) {
          statusEl.setAttribute('data-state', initialStatus);
          statusEl.textContent = initialStatus === 'done' ? '✓' : initialStatus === 'error' ? '✕' : '';
          wrap.setAttribute('data-status', initialStatus);
        }
        wrap.appendChild(statusEl);
      }
      wrap.appendChild(div);
      messagesEl.insertBefore(wrap, typingEl);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return wrap;
    }

    function setWrapStatus(wrap, state) {
      if (!wrap) return;
      wrap.setAttribute('data-status', state);
      const statusEl = wrap.querySelector('.msg-status');
      if (!statusEl) return;
      statusEl.setAttribute('data-state', state);
      if (state === 'done') statusEl.textContent = '✓';
      else if (state === 'error') statusEl.textContent = '✕';
      else statusEl.textContent = '';
    }

    function loadCachedMessages() {
      try {
        const raw = localStorage.getItem(CHAT_CACHE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        if (!Array.isArray(parsed)) return;
        chatMessages = parsed
          .filter((x) => x && typeof x.role === 'string' && typeof x.text === 'string')
          .slice(-CHAT_CACHE_LIMIT);
        if (chatMessages.length === 0) return;
        messagesEl.querySelectorAll('.msg-wrap').forEach((el) => el.remove());
        for (const msg of chatMessages) {
          renderMsg(msg.role, msg.text, msg.at || new Date());
        }
        history = chatMessages
          .filter((msg) => msg.role === 'user' || msg.role === 'assistant')
          .map((msg) => ({ role: msg.role, content: msg.text }))
          .slice(-20);
      } catch {
        // ignore malformed cache
      }
    }

    function addMsg(role, text, options = {}) {
      const item = { role, text, at: new Date().toISOString() };
      chatMessages.push(item);
      if (chatMessages.length > CHAT_CACHE_LIMIT) chatMessages = chatMessages.slice(-CHAT_CACHE_LIMIT);
      saveChatMessages();
      const initialStatus = role === 'user' && options.status ? options.status : role === 'user' ? 'done' : null;
      return renderMsg(role, text, item.at, initialStatus);
    }

    function loadChannelSeenIds() {
      try {
        const raw = localStorage.getItem(CHANNEL_SEEN_IDS_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        if (!Array.isArray(parsed)) return;
        channelSeenIds = new Set(
          parsed
            .map((v) => Number(v))
            .filter((v) => Number.isFinite(v))
            .slice(-300),
        );
      } catch {
        channelSeenIds = new Set();
      }
    }

    function saveChannelSeenIds() {
      try {
        const arr = Array.from(channelSeenIds).slice(-300);
        localStorage.setItem(CHANNEL_SEEN_IDS_KEY, JSON.stringify(arr));
      } catch {
        // ignore localStorage issues
      }
    }

    function markChannelSeen(id) {
      if (!Number.isFinite(id)) return;
      channelSeenIds.add(id);
      if (channelSeenIds.size > 400) {
        const arr = Array.from(channelSeenIds).slice(-300);
        channelSeenIds = new Set(arr);
      }
      saveChannelSeenIds();
    }

    function saveChannelLastId(value) {
      channelLastId = Number.isFinite(value) ? value : channelLastId;
      try {
        localStorage.setItem(CHANNEL_LAST_ID_KEY, String(channelLastId));
      } catch {
        // ignore localStorage issues
      }
    }

    async function pollServerChannel() {
      try {
        channelPollTick += 1;
        const replayMode = localStorage.getItem(CHANNEL_FORCE_REPLAY_KEY) !== '0';
        const resync = replayMode || channelPollTick % 12 === 0;
        const after = resync ? 0 : channelLastId;
        const res = await fetch(`/api/chat/channel?after=${encodeURIComponent(String(after))}`, {
          method: 'GET',
          cache: 'no-store',
        });
        if (!res.ok) return;
        const data = await res.json().catch(() => null);
        const items = Array.isArray(data?.messages) ? data.messages : [];
        if (items.length === 0) return;

        for (const item of items) {
          const text = String(item?.text ?? '').trim();
          const id = Number(item?.id ?? 0);
          const from = String(item?.from ?? '').trim();
          if (!text || !Number.isFinite(id) || channelSeenIds.has(id)) continue;
          if (from === 'user') {
            markChannelSeen(id);
            saveChannelLastId(id);
            continue;
          }
          addMsg('assistant', text);
          history.push({ role: 'assistant', content: text });
          if (history.length > 20) history = history.slice(-20);
          markChannelSeen(id);
          saveChannelLastId(id);
        }
        if (replayMode && items.length > 0) {
          localStorage.setItem(CHANNEL_FORCE_REPLAY_KEY, '0');
        }
        forceScrollToLatestWithRetries();
      } catch {
        // silent: channel polling must not spam UI with errors
      }
    }

    function scrollToLatestMessage() {
      if (!messagesEl) return;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function forceScrollToLatestWithRetries() {
      const delays = [0, 120, 400, 900];
      for (const delay of delays) {
        window.setTimeout(scrollToLatestMessage, delay);
      }
    }

    loadCachedMessages();
    loadChannelSeenIds();
    if (!localStorage.getItem(CHANNEL_FORCE_REPLAY_KEY)) {
      localStorage.setItem(CHANNEL_FORCE_REPLAY_KEY, '1');
    }
    const greetingTimeEl = document.getElementById('greetingTime');
    if (greetingTimeEl && chatMessages.length === 0) {
      greetingTimeEl.textContent = formatMsgTime();
    }

    let _busyOnAt = 0;
    let _busyOffTimer = null;
    const MIN_BUSY_MS = 800;
    function setLoading(on) {
      const progressBarEl = document.getElementById('progressBar');
      const applyState = (state) => {
        if (progressBarEl) progressBarEl.classList.toggle('on', Boolean(state));
        document.body.classList.toggle('busy', Boolean(state));
        typingEl.style.display = state ? 'block' : 'none';
        sendBtn.disabled = Boolean(state);
        inputEl.disabled = Boolean(state);
        if (voiceBtnEl) voiceBtnEl.disabled = Boolean(state);
        if (voiceClearBtnEl) voiceClearBtnEl.disabled = Boolean(state);
        if (state && voiceUiActive) {
          forceStopVoice();
        }
        messagesEl.scrollTop = messagesEl.scrollHeight;
      };
      if (on) {
        if (_busyOffTimer) {
          clearTimeout(_busyOffTimer);
          _busyOffTimer = null;
        }
        _busyOnAt = Date.now();
        applyState(true);
        return;
      }
      const elapsed = Date.now() - _busyOnAt;
      const remainingMs = Math.max(0, MIN_BUSY_MS - elapsed);
      if (_busyOffTimer) clearTimeout(_busyOffTimer);
      _busyOffTimer = setTimeout(() => {
        applyState(false);
        _busyOffTimer = null;
      }, remainingMs);
    }

    function setStatusLineText(text) {
      const textEl = document.getElementById('statusLineText');
      if (textEl) textEl.textContent = text;
      else if (statusLineEl) statusLineEl.textContent = text;

    async function refreshPending() {
      try {
        const res = await fetch('/api/debug/control-summary-compact', { method: 'GET' });
        const data = await res.json().catch(() => null);
        const nextId = data?.summary?.pendingRequestId ?? null;

        const newPendingAppeared = Boolean(nextId) && nextId !== lastNotifiedPendingId;
        if (newPendingAppeared) lastNotifiedPendingId = nextId;

        setConfirmUi(nextId);

        if (nextId) {

    function ensureAudioContext() {
      if (audioCtx) return audioCtx;
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return null;
      audioCtx = new Ctx();
      return audioCtx;
    }

    function playBeep() {
      const ctx = ensureAudioContext();
      if (!ctx) return;
      try {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 880;
        gain.gain.value = 0.08;
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        setTimeout(() => {
          try { osc.stop(); } catch {}
        }, 140);
      } catch {
        // ignore audio errors
      }
    }

    function playCalendarAlarmChime() {
      const ctx = ensureAudioContext();
      if (!ctx) return;
      const seq = [740, 988, 740, 1108];
      let i = 0;
      function step() {
        if (i >= seq.length) return;
        try {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'triangle';
          osc.frequency.value = seq[i];
          gain.gain.value = 0.11;
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          setTimeout(() => {
            try { osc.stop(); } catch {}
          }, 160);
        } catch {}
        i += 1;
        setTimeout(step, 200);
      }
      step();
    }

    function clearCalendarAlarmSound() {
      if (calAlarmSoundTimer) {
        clearInterval(calAlarmSoundTimer);
        calAlarmSoundTimer = null;
      }
    }

    function startCalendarAlarmSoundLoop() {
      clearCalendarAlarmSound();
      if (!soundEnabled || !activeCalendarAlarm) return;
      playCalendarAlarmChime();
      calAlarmSoundTimer = setInterval(() => {
        if (soundEnabled && activeCalendarAlarm) playCalendarAlarmChime();

    function renderCalendarAlarmOverlay(alarms) {
      if (!calAlarmEl || !calAlarmCardEl) return;
      if (!alarms || alarms.length === 0) {
        calAlarmEl.hidden = true;

        clearCalendarAlarmSound();
        return;
      }

      const a = alarms[0];
      activeCalendarAlarm = a;
      calAlarmEl.hidden = false;

      const isBday = a.kind === 'birthday';
      calAlarmCardEl.className = 'cal-alarm-card ' + (isBday ? 'birthday' : 'standard');
      if (calAlarmEyebrowEl) {
        calAlarmEyebrowEl.textContent = isBday ? 'Eriline päev' : 'Kalendri äratus';
      }
      if (calAlarmTitleEl) {
        calAlarmTitleEl.textContent = a.summary || 'Sündmus';

      const loc = a.location ? `\n📍 ${a.location}` : '';
      if (calAlarmMetaEl) {

          `Algus / lõpp kalendris: ${a.start} → ${a.end}${loc}\n\nKuni ei vajuta nuppu, tuletan meelde uuesti (heli: ülemine Sound lüliti).`;
      }

      document.title = isBday ? '🎂 Meeldetuletus — Robert' : 'Meeldetuletus — Robert';
      startCalendarAlarmSoundLoop();
    }

    async function refreshCalendarAlarms() {

      }

    async function postCalendarAlarmAck(action) {
      if (!activeCalendarAlarm?.fireKey) return;
      const body =
        action === 'snooze'
          ? { fireKey: activeCalendarAlarm.fireKey, action: 'snooze', snoozeMinutes: 10 }
          : { fireKey: activeCalendarAlarm.fireKey, action: 'dismiss' };

    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - (base64String.length % 4)) % 4);
      const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const rawData = atob(base64);
      const outputArray = new Uint8Array(rawData.length);
      for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
      return outputArray;
    }

    function isIosSafari() {
      const ua = navigator.userAgent || '';
      const isIos = /iPad|iPhone|iPod/.test(ua);
      return isIos;
    }

    function isStandalonePwa() {
      try {
        if (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) return true;
      } catch {
        /* ignore */
      }
      return Boolean(navigator.standalone);
    }

    async function enablePush(opts = {}) {
      const silent = Boolean(opts && opts.silent);
      if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
        if (!silent) {
          if (isIosSafari() && !isStandalonePwa()) {
            addMsg(
              'assistant',
              'iOS-is tuleb Robert enne Push aktiveerimist lisada avaekraanile: Safari → jaga-nupp → „Lisa avaekraanile”. Seejärel ava Robert avaekraanilt ja vajuta Push uuesti.',
            );
          } else {
            addMsg('assistant', 'Push ei ole selles brauseris saadaval.');
          }
        }
        return false;
      }

      if (isIosSafari() && !isStandalonePwa()) {
        if (!silent) {
          addMsg(
            'assistant',
            'iOS-is tuleb Robert enne Push aktiveerimist lisada avaekraanile: Safari → jaga-nupp → „Lisa avaekraanile”. Seejärel ava Robert avaekraanilt ja vajuta Push uuesti.',
          );
        }
        return false;
      }

      const permission = await Notification.requestPermission();
      if (permission !== 'granted') {
        if (!silent) addMsg('assistant', 'Push teavituste luba ei antud.');
        return false;
      }

      const storedCode = localStorage.getItem('jarvisPushPairCode') || '';
      const code =
        (silent
          ? storedCode
          : prompt(
              'Pair code: kui .env-is on PUSH_PAIR_CODE, siis see lühike number; muidu kleebi terve JARVIS_BRIDGE_TOKEN.',
            ) || '') || '';
      if (!code.trim()) return false;

      const keyRes = await fetch(`/api/push/public-key?ts=${Date.now()}`, {
        method: 'GET',
        cache: 'no-store',
        headers: { 'Cache-Control': 'no-cache', Pragma: 'no-cache' },
      });
      const keyData = await keyRes.json().catch(() => null);
      const publicKey = keyData?.publicKey;
      if (!publicKey) {
        if (!silent) addMsg('assistant', 'Push võtme päring ebaõnnestus.');
        return false;
      }

      const reg = await navigator.serviceWorker.register('/sw.js');
      // iOS/Safari can throw if a subscription already exists; reuse it when present.
      const existing = await reg.pushManager.getSubscription().catch(() => null);
      const sub =
        existing ||
        (await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(publicKey),
        }));

      const subscribeRes = await fetch('/api/push/subscribe', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-jarvis-pair-code': code.trim(),
        },
        body: JSON.stringify({ subscription: sub, code: code.trim() }),
      });

      if (!subscribeRes.ok) {
        const subscribeJson = await subscribeRes.json().catch(() => null);
        const errText =
          (subscribeJson && (subscribeJson.error || subscribeJson.message)) ||
          (await subscribeRes.text().catch(() => ''));
        if (!silent) {
          if (subscribeRes.status === 401 || String(errText).includes('PUSH_UNAUTHORIZED')) {
            addMsg('assistant', 'Push ei lülitunud sisse: pair code on vale. Sisesta õige 6-kohaline PUSH_PAIR_CODE.');
          } else {
            addMsg('assistant', `Push subscribe ebaõnnestus (HTTP ${subscribeRes.status}). ${errText}`.trim());
          }
        }
        return false;
      }

      pushEnabled = true;
      localStorage.setItem('jarvisPushPairCode', code.trim());
      localStorage.setItem('jarvisPushEnabled', '1');
      updatePushToggleUi();
      if (!silent) addMsg('assistant', 'OK, push teavitused on sees.');
      return true;
    }

    async function disablePush() {
      pushEnabled = false;
      localStorage.setItem('jarvisPushEnabled', '0');
      updatePushToggleUi();
      addMsg('assistant', 'Push lülitatud välja (subscription jääb serverisse alles).');
      return true;
    }

    async function runSilentChannelWatchdog() {
      const controller = new AbortController();
      const tid = setTimeout(() => controller.abort(), 6000);
      try {
        const healthRes = await fetch('/health', { cache: 'no-store', signal: controller.signal });
        if (!healthRes.ok) return;
        const pushRes = await fetch('/api/push/status', { cache: 'no-store', signal: controller.signal });
        const pushData = await pushRes.json().catch(() => null);
        const subscriptions = Number(pushData?.subscriptions ?? 0);
        const vapidReady = Boolean(pushData?.vapidReady);
        if (pushEnabled && vapidReady && subscriptions === 0 && !pushAutoRepairInFlight) {
          pushAutoRepairInFlight = true;
          try {
            await enablePush({ silent: true });
          } finally {
            pushAutoRepairInFlight = false;
          }
        }
      } catch {
        // vaikselt ignore
      } finally {
        clearTimeout(tid);
      }
    }

    function pickJarvisApiErrorMessage(data) {
      if (!data || typeof data !== 'object') return 'Päring ebaõnnestus';
      if (typeof data.message === 'string' && data.message.trim()) return data.message.trim();
      if (typeof data.error === 'string' && data.error.trim()) return data.error.trim();
      if (data.error && typeof data.error === 'object' && typeof data.error.message === 'string') {
        return data.error.message.trim();
      }
      if (typeof data.reply === 'string' && data.reply.trim()) return data.reply.trim();
      return 'Päring ebaõnnestus';
    }

    async function pingJarvisHealth() {
      if (!statusLineEl) return;
      const controller = new AbortController();
      const tid = setTimeout(() => controller.abort(), 6000);
      try {
        const res = await fetch('/health', { cache: 'no-store', signal: controller.signal });
        const data = await res.json().catch(() => ({}));
        if (res.ok && data.status === 'ok') {
          setStatusLineText('Jarvise assistent · ooteseis');
          statusLineEl.classList.remove('bad');
          statusLineEl.classList.add('ok');
          return;
        }
        throw new Error('bad health');
      } catch {
        setStatusLineText('Jarvise assistent · server ei vasta');
        statusLineEl.classList.remove('ok');
        statusLineEl.classList.add('bad');
      } finally {
        clearTimeout(tid);
      }
    }

    async function send() {
      hideReplyConfirm();
      inputEl.placeholder = 'Kirjuta siia...';
      const text = inputEl.value.trim();
      if (!text) return;

      // Quick "YES/continue" shortcut:
      // If the user types "ppp" we try to confirm a pending request (if any),
      // otherwise we fall back to normal chat send.
      if (text.toLowerCase() === 'ppp') {
        addMsg('user', text);
        inputEl.value = '';
        inputEl.style.height = 'auto';
        setLoading(true);

        try {
          await refreshPending();
          if (!pendingRequestId) {
            addMsg('assistant', 'Praegu ei ole ühtegi ootel kinnitust.');
          } else {
            await confirmPending();
          }
        } catch {
          addMsg('assistant', 'Ühenduse viga. Proovi uuesti.');
        } finally {
          setLoading(false);
          lockComposeKeyboard();
        }

        return;
      }

      const userWrap = addMsg('user', text, { status: 'sending' });
      inputEl.value = '';
      inputEl.style.height = 'auto';
      setLoading(true);

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          cache: 'no-store',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: text,
            history,
            clientTimeZone: Intl.DateTimeFormat().resolvedOptions().timeZone || '',
            clientLocale: typeof navigator !== 'undefined' ? navigator.language || '' : '',
            clientLocalCalendarDate: (() => {
              const d = new Date();
              return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            })(),
          }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          const errMsg = pickJarvisApiErrorMessage(data);
          // Kui AI-/võrgukiht vastab 5xx, ära kaota kasutaja sõnumit:
          // kirjuta see varukanalisse ja anna "kätte saadud" vastus.
          if (res.status >= 500) {
            const backupOk = await sendViaChannelFallback(text);
            if (backupOk) {
              setWrapStatus(userWrap, 'done');
              addMsg('assistant', 'Server andis 5xx, aga sinu sõnum saadeti varukanalisse ja on kätte saadud.');
            } else {
              setWrapStatus(userWrap, 'error');
              addMsg('assistant', `Viga (HTTP ${res.status}): ${errMsg}`);
            }
          } else {
            setWrapStatus(userWrap, 'error');
            addMsg('assistant', `Viga (HTTP ${res.status}): ${errMsg}`);
          }
          hideReplyConfirm();
        } else {
          const reply = data.reply || data.error || 'Viga';
          setWrapStatus(userWrap, 'done');
          addMsg('assistant', reply);
          if (data.degraded) {
            const errHint = data.error ? ` (${data.error})` : '';
            addMsg('assistant', `Märkus: AI ühendus oli kõikuv, kasutasin varuvastust${errHint}.`);
          }
          showReplyConfirmIfNeeded(reply, text);
          history.push({ role: 'user', content: text });
          history.push({ role: 'assistant', content: reply });
          if (history.length > 20) history = history.slice(-20);
        }
      } catch {
        const backupOk = await sendViaChannelFallback(text);
        if (backupOk) {
          setWrapStatus(userWrap, 'done');
          addMsg('assistant', 'Põhikanal katkes, aga sinu sõnum saadeti varukanalisse ja on kätte saadud.');
        } else {
          setWrapStatus(userWrap, 'error');
          addMsg('assistant', 'Ühenduse viga. Proovi uuesti.');
        }
        hideReplyConfirm();
      } finally {
        setLoading(false);
        lockComposeKeyboard();
      }
    }

    if (replyConfirmYesEl) {
      replyConfirmYesEl.addEventListener('click', () => {
        inputEl.value =
          'Jah — kinnitan. Palun täida kalendrist kustutamine lõpuni (õige kuupäev või id-d vastavalt eelmisele vestlusele); ära keela ega suuna mind käsitsi Google Calendarisse.';
        send();
      });
    }
    if (replyConfirmNoEl) {
      replyConfirmNoEl.addEventListener('click', () => {
        inputEl.value = 'Ei, ära tee seda tegevust.';
        send();
      });
    }

    if (replyConfirmAltEl) {
      replyConfirmAltEl.addEventListener('click', () => {
        inputEl.placeholder = 'Kirjuta teine või täpsem soov; võid kasutada häälnuppu…';
        unlockComposeForTyping();
        inputEl.focus();
        try {
          inputEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        } catch {
          /* ignore */
        }
      });
    }

    if (voiceClearBtnEl) {
      voiceClearBtnEl.addEventListener('click', (e) => {
        e.preventDefault();
        hideReplyConfirm();
        if (voiceUiActive) {
          forceStopVoice();
        }
        inputEl.placeholder = 'Kirjuta siia...';
        inputEl.value = '';
        inputEl.style.height = 'auto';
        lockComposeKeyboard();
      });
    }

    if (voiceBtnEl) {
      voiceBtnEl.addEventListener('click', () => {
        if (voiceBtnEl.disabled) return;
        if (voiceUiActive) {
          forceStopVoice();
          return;
        }
        startVoiceSession();
      });
    }

    sendBtn.addEventListener('click', send);
    confirmYesEl.addEventListener('click', confirmPending);
    confirmNoEl.addEventListener('click', cancelPending);
    if (soundToggleEl) {
      soundToggleEl.addEventListener('click', async () => {
        soundEnabled = !soundEnabled;
        localStorage.setItem('jarvisSoundEnabled', soundEnabled ? '1' : '0');
        updateSoundToggleUi();
        if (soundEnabled) {
          const ctx = ensureAudioContext();
          try { await ctx?.resume?.(); } catch {}
          playBeep();
          if (activeCalendarAlarm) startCalendarAlarmSoundLoop();
        }
      });
    }

    if (pushToggleEl) {
      pushToggleEl.addEventListener('click', async () => {
        try {
          if (pushEnabled) await disablePush();
          else await enablePush();
        } catch {
          addMsg('assistant', 'Push seadistamine ebaõnnestus.');
        }
      });
    }

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    (function wireComposeKeyboardGate() {
      function onComposeFieldActivate() {
        unlockComposeForTyping();
        setTimeout(() => {
          try {
            inputEl.focus({ preventScroll: true });
          } catch {
            try {
              inputEl.focus();
            } catch {
              /* ignore */
            }
          }
        }, 0);
      }
      inputEl.addEventListener('touchend', onComposeFieldActivate, { passive: true });
      inputEl.addEventListener('click', onComposeFieldActivate);
      inputEl.addEventListener('focus', onComposeFieldActivate);
    })();

    lockComposeKeyboard();
    if ('scrollRestoration' in window.history) {
      window.history.scrollRestoration = 'manual';
    }
    requestAnimationFrame(forceScrollToLatestWithRetries);
    window.addEventListener('pageshow', () => {
      requestAnimationFrame(forceScrollToLatestWithRetries);
    });
    window.addEventListener('load', () => {
      forceScrollToLatestWithRetries();
    });
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        requestAnimationFrame(forceScrollToLatestWithRetries);
      }
    });

    pingJarvisHealth();
    setInterval(pingJarvisHealth, 45000);
    runSilentChannelWatchdog();
    setInterval(runSilentChannelWatchdog, 75000);
    autoEnablePushOnLaunch();
    updateSoundToggleUi();
    updatePushToggleUi();
    syncSpeechLangUi();
    refreshPending();
    setInterval(refreshPending, 2000);
    pollServerChannel();
    setInterval(pollServerChannel, 2500);

    if (calAlarmYesEl) calAlarmYesEl.addEventListener('click', () => postCalendarAlarmAck('dismiss'));
    if (calAlarmNoEl) calAlarmNoEl.addEventListener('click', () => postCalendarAlarmAck('snooze'));

    refreshCalendarAlarms();
    setInterval(refreshCalendarAlarms, 12000);
  </script>
</body>
</html>
