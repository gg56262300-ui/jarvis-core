<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Robert — Jarvis</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e8e8e8;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 16px;
      background: #1a1d27;
      border-bottom: 1px solid #2a2d3a;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    body.pending header {
      background: #2a1630;
      border-bottom-color: #4c1d95;
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .sound-toggle {
      border: 1px solid #2a2d3a;
      background: #0f1117;
      color: #e8e8e8;
      padding: 8px 10px;
      border-radius: 14px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    .sound-toggle.on {
      border-color: #2bbf7b;
      background: rgba(62, 207, 142, 0.15);
    }

    .push-toggle {
      border: 1px solid #2a2d3a;
      background: #0f1117;
      color: #e8e8e8;
      padding: 8px 10px;
      border-radius: 14px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    .push-toggle.on {
      border-color: #60a5fa;
      background: rgba(96, 165, 250, 0.15);
    }

    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff, #3ecf8e);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px; color: white;
    }

    .header-info h1 { font-size: 16px; font-weight: 600; }
    .header-info p { font-size: 12px; color: #6b7280; }
    #statusLine.ok { color: #6ee7b7; }
    #statusLine.bad { color: #f87171; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .msg-wrap {
      display: flex;
      max-width: 92%;
      gap: 8px;
      align-items: flex-end;
    }

    .msg-wrap.user {
      align-self: flex-end;
      flex-direction: row-reverse;
      margin-left: auto;
    }

    .msg-wrap.assistant {
      align-self: flex-start;
    }

    .msg-wrap.system {
      align-self: center;
      max-width: 100%;
      justify-content: center;
      gap: 8px;
    }

    .msg-time {
      font-size: 11px;
      color: #6b7280;
      white-space: nowrap;
      flex-shrink: 0;
      line-height: 1.3;
      padding-bottom: 2px;
      max-width: 96px;
      text-align: center;
    }

    .msg-wrap.system .msg-time {
      color: #4b5563;
    }

    .msg {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.5;
      word-break: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: #6c63ff;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .msg.assistant {
      align-self: flex-start;
      background: #1e2130;
      color: #e8e8e8;
      border-bottom-left-radius: 4px;
    }

    .msg.system {
      align-self: center;
      background: transparent;
      color: #4b5563;
      font-size: 12px;
      padding: 4px 0;
    }

    .typing {
      align-self: flex-start;
      background: #1e2130;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
      display: none;
    }

    .typing span {
      display: inline-block;
      width: 7px; height: 7px;
      background: #6b7280;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
      margin: 0 2px;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .footer-stack {
      padding: 10px 12px 12px;
      background: #1a1d27;
      border-top: 1px solid #2a2d3a;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .confirm-bar {
      display: none;
      width: 100%;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid #2a2d3a;
      border-radius: 16px;
      background: #0f1117;
    }

    .reply-confirm-row {
      display: flex;
      width: 100%;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 6px 4px 2px;
    }

    .reply-confirm-row[hidden] {
      display: none !important;
    }

    .reply-confirm-label {
      font-size: 11px;
      color: #94a3b8;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-right: 4px;
    }

    .reply-confirm-btn {
      border: 1px solid #2a2d3a;
      padding: 10px 18px;
      border-radius: 16px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .reply-confirm-btn.yes {
      background: #22c55e;
      color: #052e16;
      border-color: #16a34a;
    }

    .reply-confirm-btn.no {
      background: #475569;
      color: #f1f5f9;
      border-color: #64748b;
    }

    .footer-input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      width: 100%;
    }

    .voice-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid #2a2d3a;
      background: #0f1117;
      color: #e8e8e8;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: border-color 0.2s, background 0.2s;
    }

    .voice-btn:hover {
      border-color: #6c63ff;
    }

    .voice-btn.listening {
      border-color: #ef4444;
      background: rgba(239, 68, 68, 0.2);
      animation: voicePulse 1s ease-in-out infinite;
    }

    @keyframes voicePulse {
      50% { box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.35); }
    }

    body.chat-reply-confirm-active #input {
      flex: 1 1 38%;
      min-width: 0;
      max-width: min(52vw, 220px);
    }

    @media (min-width: 480px) {
      body.chat-reply-confirm-active #input {
        max-width: 280px;
      }
    }

    .confirm-bar .label {
      flex: 1;
      font-size: 12px;
      color: #cbd5e1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .confirm-btn {
      border: 1px solid #2a2d3a;
      background: #1e2130;
      color: #e8e8e8;
      padding: 8px 12px;
      border-radius: 14px;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
      flex-shrink: 0;
    }

    .confirm-btn.yes { background: #3ecf8e; color: #0f1117; border-color: #2bbf7b; }
    .confirm-btn.no { background: #ef4444; color: #0f1117; border-color: #dc2626; }
    .confirm-btn:disabled { opacity: 0.6; cursor: default; }

    #input {
      flex: 1;
      min-width: 0;
      background: #0f1117;
      border: 1px solid #2a2d3a;
      border-radius: 20px;
      padding: 10px 16px;
      color: #e8e8e8;
      font-size: 15px;
      resize: none;
      max-height: 120px;
      outline: none;
      line-height: 1.4;
    }

    #input:focus { border-color: #6c63ff; }
    #input::placeholder { color: #4b5563; }

    #send {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: #6c63ff;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    #send:hover { background: #5a52d5; }
    #send:disabled { background: #2a2d3a; cursor: default; }

    #send svg { fill: white; }

    /* Kalendri äratus (kuni Jah / Ei) */
    .cal-alarm-root {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(8, 10, 18, 0.78);
      backdrop-filter: blur(8px);
    }
    .cal-alarm-root[hidden] { display: none !important; }

    .cal-alarm-card {
      max-width: 440px;
      width: 100%;
      border-radius: 26px;
      padding: 26px 22px 20px;
      text-align: center;
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.55);
      animation: calPulse 2.2s ease-in-out infinite;
    }

    @keyframes calPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 28px 70px rgba(0, 0, 0, 0.55); }
      50% { transform: scale(1.02); box-shadow: 0 32px 80px rgba(255, 120, 80, 0.35); }
    }

    .cal-alarm-card.birthday {
      background: linear-gradient(155deg, #fff7e6 0%, #ffb4a8 38%, #ff7eb3 72%, #c084fc 100%);
      color: #1a0a12;
      border: 3px solid rgba(255, 255, 255, 0.95);
    }

    .cal-alarm-card.standard {
      background: linear-gradient(165deg, #0f172a 0%, #7f1d1d 55%, #b45309 100%);
      color: #fffbeb;
      border: 2px solid #fb923c;
    }

    .cal-alarm-eyebrow {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.85;
      margin-bottom: 8px;
    }

    .cal-alarm-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 12px;
      line-height: 1.25;
    }

    .cal-alarm-meta {
      font-size: 13px;
      opacity: 0.88;
      margin-bottom: 18px;
      line-height: 1.45;
    }

    .cal-alarm-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .cal-alarm-btn {
      border: none;
      border-radius: 16px;
      padding: 12px 20px;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      min-width: 120px;
    }

    .cal-alarm-btn.yes {
      background: #22c55e;
      color: #052e16;
    }

    .cal-alarm-btn.no {
      background: #f97316;
      color: #1c0a00;
    }

    .cal-alarm-btn:disabled { opacity: 0.55; cursor: default; }
  </style>
</head>
<body>
  <header>
    <div class="avatar">R</div>
    <div class="header-info">
      <h1>Robert</h1>
      <p id="statusLine" class="ok">Jarvise assistent · kontrollin ühendust…</p>
    </div>
    <div class="header-actions">
      <button class="sound-toggle" id="soundToggle" type="button">Sound: OFF</button>
      <button class="push-toggle" id="pushToggle" type="button">Push: OFF</button>
    </div>
  </header>

  <div id="messages">
    <div class="msg-wrap system">
      <span class="msg-time" id="greetingTime"></span>
      <div class="msg system">Tere! Kuidas saan aidata?</div>
    </div>
    <div class="typing" id="typing">
      <span></span><span></span><span></span>
    </div>
  </div>

  <footer class="footer-stack">
    <div class="confirm-bar" id="confirmBar">
      <div class="label" id="confirmLabel">Ootan kinnitust…</div>
      <button class="confirm-btn yes" id="confirmYes">JAH</button>
      <button class="confirm-btn no" id="confirmNo">EI</button>
    </div>
    <div id="replyConfirmRow" class="reply-confirm-row" hidden>
      <span class="reply-confirm-label">Vasta</span>
      <button type="button" class="reply-confirm-btn yes" id="replyConfirmYes">Jah</button>
      <button type="button" class="reply-confirm-btn no" id="replyConfirmNo">Ei</button>
    </div>
    <div class="footer-input-row">
      <button type="button" class="voice-btn" id="voiceBtn" title="Häälkäsk. Pikk vajutus = vaheta et/ru.">🎤</button>
      <textarea id="input" rows="1" placeholder="Kirjuta siia..."></textarea>
      <button id="send" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </footer>

  <div id="calAlarm" class="cal-alarm-root" hidden>
    <div class="cal-alarm-card standard" id="calAlarmCard">
      <div class="cal-alarm-eyebrow" id="calAlarmEyebrow">Kalender</div>
      <div class="cal-alarm-title" id="calAlarmTitle">Meeldetuletus</div>
      <div class="cal-alarm-meta" id="calAlarmMeta"></div>
      <div class="cal-alarm-actions">
        <button type="button" class="cal-alarm-btn yes" id="calAlarmYes">Jah — lõpeta</button>
        <button type="button" class="cal-alarm-btn no" id="calAlarmNo">Ei — 10 min hiljem</button>
      </div>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const typingEl = document.getElementById('typing');
    const statusLineEl = document.getElementById('statusLine');
    const confirmBarEl = document.getElementById('confirmBar');
    const confirmLabelEl = document.getElementById('confirmLabel');
    const confirmYesEl = document.getElementById('confirmYes');
    const confirmNoEl = document.getElementById('confirmNo');
    const soundToggleEl = document.getElementById('soundToggle');
    const pushToggleEl = document.getElementById('pushToggle');
    let history = [];
    let pendingRequestId = null;
    let lastNotifiedPendingId = null;
    let soundEnabled = localStorage.getItem('jarvisSoundEnabled') === '1';
    let audioCtx = null;
    let pushEnabled = localStorage.getItem('jarvisPushEnabled') === '1';
    const calAlarmEl = document.getElementById('calAlarm');
    const calAlarmCardEl = document.getElementById('calAlarmCard');
    const calAlarmEyebrowEl = document.getElementById('calAlarmEyebrow');
    const calAlarmTitleEl = document.getElementById('calAlarmTitle');
    const calAlarmMetaEl = document.getElementById('calAlarmMeta');
    const calAlarmYesEl = document.getElementById('calAlarmYes');
    const calAlarmNoEl = document.getElementById('calAlarmNo');
    let activeCalendarAlarm = null;
    let calAlarmSoundTimer = null;

    const replyConfirmRowEl = document.getElementById('replyConfirmRow');
    const replyConfirmYesEl = document.getElementById('replyConfirmYes');
    const replyConfirmNoEl = document.getElementById('replyConfirmNo');
    const voiceBtnEl = document.getElementById('voiceBtn');
    let speechLang = localStorage.getItem('jarvisSpeechLang') || 'et-EE';
    let speechRecognition = null;
    let suppressVoiceClick = false;

    function hideReplyConfirm() {
      if (replyConfirmRowEl) replyConfirmRowEl.hidden = true;
      document.body.classList.remove('chat-reply-confirm-active');
    }

    function assistantMessageSuggestsConfirmation(text) {
      const raw = (text || '').trim();
      if (raw.length < 14) return false;
      if (!/\?\s*$/.test(raw)) return false;
      const lower = raw.toLowerCase();
      if (
        /kas soovid|kas kinnitad|kas ma pean|eemaldaksin|kustutada|kustutan|soovid, et/i.test(lower)
      ) {
        return true;
      }
      if (/хотите|удалить|подтверж|убрать|очистить|удаляю/i.test(raw)) return true;
      if (/(do you want|should i remove|confirm|delete these)/i.test(lower)) return true;
      return false;
    }

    function showReplyConfirmIfNeeded(assistantText) {
      if (!replyConfirmRowEl) return;
      if (!assistantMessageSuggestsConfirmation(assistantText)) {
        hideReplyConfirm();
        return;
      }
      replyConfirmRowEl.hidden = false;
      document.body.classList.add('chat-reply-confirm-active');
      if (soundEnabled) playBeep();
    }

    function initSpeechRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) return null;
      const r = new SR();
      r.continuous = false;
      r.interimResults = false;
      r.maxAlternatives = 1;
      r.onresult = (ev) => {
        const t = ev.results[0]?.[0]?.transcript?.trim();
        if (t) {
          inputEl.value = (inputEl.value ? `${inputEl.value} ` : '') + t;
          inputEl.dispatchEvent(new Event('input'));
        }
        if (voiceBtnEl) voiceBtnEl.classList.remove('listening');
      };
      r.onerror = () => {
        if (voiceBtnEl) voiceBtnEl.classList.remove('listening');
      };
      r.onend = () => {
        if (voiceBtnEl) voiceBtnEl.classList.remove('listening');
      };
      return r;
    }

    speechRecognition = initSpeechRecognition();
    function cycleSpeechLang() {
      speechLang = speechLang === 'et-EE' ? 'ru-RU' : 'et-EE';
      localStorage.setItem('jarvisSpeechLang', speechLang);
      if (voiceBtnEl) {
        voiceBtnEl.title = `Häälkäsk (${speechLang}). Pikk vajutus (või paremklõps) = vaheta eesti ↔ vene.`;
      }
      addMsg(
        'assistant',
        `Hääle tuvastus: ${speechLang === 'et-EE' ? 'eesti (et-EE)' : 'vene (ru-RU)'}. Vihje: brauseri Web Speech ei taga 100% keelt — teksti saad alati käsitsi parandada.`,
      );
    }
    if (voiceBtnEl) {
      voiceBtnEl.title = `Häälkäsk (${speechLang}). Pikk vajutus = vaheta eesti ↔ vene.`;
    }

    function formatMsgTime(d = new Date()) {
      return d.toLocaleString('et-EE', { dateStyle: 'short', timeStyle: 'short' });
    }

    function addMsg(role, text) {
      const wrap = document.createElement('div');
      wrap.className = `msg-wrap ${role}`;
      const timeEl = document.createElement('span');
      timeEl.className = 'msg-time';
      timeEl.textContent = formatMsgTime();
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      wrap.appendChild(timeEl);
      wrap.appendChild(div);
      messagesEl.insertBefore(wrap, typingEl);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    const greetingTimeEl = document.getElementById('greetingTime');
    if (greetingTimeEl) {
      greetingTimeEl.textContent = formatMsgTime();
    }

    function setLoading(on) {
      typingEl.style.display = on ? 'block' : 'none';
      sendBtn.disabled = on;
      inputEl.disabled = on;
      if (voiceBtnEl) voiceBtnEl.disabled = on;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setConfirmUi(nextPendingId) {
      pendingRequestId = nextPendingId;
      const hasPending = Boolean(pendingRequestId);
      confirmBarEl.style.display = hasPending ? 'flex' : 'none';
      document.body.classList.toggle('pending', hasPending);
      if (statusLineEl) {
        statusLineEl.textContent = hasPending ? 'Ootan kinnitust' : 'Jarvise assistent';
      }
      if (hasPending) {
        confirmLabelEl.textContent = 'Ootan kinnitust…';
      }
    }

    async function refreshPending() {
      try {
        const res = await fetch('/api/debug/control-summary-compact', { method: 'GET' });
        const data = await res.json().catch(() => null);
        const nextId = data?.summary?.pendingRequestId ?? null;

        const newPendingAppeared = Boolean(nextId) && nextId !== lastNotifiedPendingId;
        if (newPendingAppeared) lastNotifiedPendingId = nextId;

        setConfirmUi(nextId);

        if (nextId) {
          const pendingRes = await fetch('/api/debug/terminal-pending', { method: 'GET' });
          const pendingData = await pendingRes.json().catch(() => null);
          const label = pendingData?.label || pendingData?.id || null;
          if (label) {
            confirmLabelEl.textContent = `Kinnita: ${label}`;
          }
        }

        if (newPendingAppeared) {
          document.title = 'Ootan kinnitust — Robert';
          if (soundEnabled) {
            playBeep();
          }
        } else if (!nextId) {
          if (!activeCalendarAlarm) {
            document.title = 'Robert — Jarvis';
          } else {
            document.title =
              activeCalendarAlarm.kind === 'birthday'
                ? '🎂 Meeldetuletus — Robert'
                : 'Meeldetuletus — Robert';
          }
        }
      } catch {
        // keep silent; UI stays as-is
      }
    }

    function ensureAudioContext() {
      if (audioCtx) return audioCtx;
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return null;
      audioCtx = new Ctx();
      return audioCtx;
    }

    function playBeep() {
      const ctx = ensureAudioContext();
      if (!ctx) return;
      try {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 880;
        gain.gain.value = 0.08;
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        setTimeout(() => {
          try { osc.stop(); } catch {}
        }, 140);
      } catch {
        // ignore audio errors
      }
    }

    function playCalendarAlarmChime() {
      const ctx = ensureAudioContext();
      if (!ctx) return;
      const seq = [740, 988, 740, 1108];
      let i = 0;
      function step() {
        if (i >= seq.length) return;
        try {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'triangle';
          osc.frequency.value = seq[i];
          gain.gain.value = 0.11;
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          setTimeout(() => {
            try { osc.stop(); } catch {}
          }, 160);
        } catch {}
        i += 1;
        setTimeout(step, 200);
      }
      step();
    }

    function clearCalendarAlarmSound() {
      if (calAlarmSoundTimer) {
        clearInterval(calAlarmSoundTimer);
        calAlarmSoundTimer = null;
      }
    }

    function startCalendarAlarmSoundLoop() {
      clearCalendarAlarmSound();
      if (!soundEnabled || !activeCalendarAlarm) return;
      playCalendarAlarmChime();
      calAlarmSoundTimer = setInterval(() => {
        if (soundEnabled && activeCalendarAlarm) playCalendarAlarmChime();
      }, 20000);
    }

    function renderCalendarAlarmOverlay(alarms) {
      if (!calAlarmEl || !calAlarmCardEl) return;
      if (!alarms || alarms.length === 0) {
        calAlarmEl.hidden = true;
        activeCalendarAlarm = null;
        clearCalendarAlarmSound();
        return;
      }

      const a = alarms[0];
      activeCalendarAlarm = a;
      calAlarmEl.hidden = false;

      const isBday = a.kind === 'birthday';
      calAlarmCardEl.className = 'cal-alarm-card ' + (isBday ? 'birthday' : 'standard');
      if (calAlarmEyebrowEl) {
        calAlarmEyebrowEl.textContent = isBday ? 'Eriline päev' : 'Kalendri äratus';
      }
      if (calAlarmTitleEl) {
        calAlarmTitleEl.textContent = a.summary || 'Sündmus';
      }
      const loc = a.location ? `\n📍 ${a.location}` : '';
      if (calAlarmMetaEl) {
        calAlarmMetaEl.textContent =
          `Algus / lõpp kalendris: ${a.start} → ${a.end}${loc}\n\nKuni ei vajuta nuppu, tuletan meelde uuesti (heli: ülemine Sound lüliti).`;
      }

      document.title = isBday ? '🎂 Meeldetuletus — Robert' : 'Meeldetuletus — Robert';
      startCalendarAlarmSoundLoop();
    }

    async function refreshCalendarAlarms() {
      if (!calAlarmEl) return;
      try {
        const res = await fetch('/api/calendar/alarms/due', { cache: 'no-store' });
        if (!res.ok) return;
        const data = await res.json().catch(() => null);
        const alarms = Array.isArray(data?.alarms) ? data.alarms : [];
        renderCalendarAlarmOverlay(alarms);
        if (!alarms.length && document.title.includes('Meeldetuletus')) {
          document.title = 'Robert — Jarvis';
        }
      } catch {
        // vaikne
      }
    }

    async function postCalendarAlarmAck(action) {
      if (!activeCalendarAlarm?.fireKey) return;
      const body =
        action === 'snooze'
          ? { fireKey: activeCalendarAlarm.fireKey, action: 'snooze', snoozeMinutes: 10 }
          : { fireKey: activeCalendarAlarm.fireKey, action: 'dismiss' };
      try {
        const res = await fetch('/api/calendar/alarms/ack', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!res.ok) {
          addMsg('assistant', `Kalendri äratus ei salvestunud (HTTP ${res.status}).`);
        }
      } catch {
        addMsg('assistant', 'Kalendri äratus: ühenduse viga.');
      } finally {
        await refreshCalendarAlarms();
      }
    }

    function updateSoundToggleUi() {
      if (!soundToggleEl) return;
      soundToggleEl.classList.toggle('on', soundEnabled);
      soundToggleEl.textContent = soundEnabled ? 'Sound: ON' : 'Sound: OFF';
    }

    function updatePushToggleUi() {
      if (!pushToggleEl) return;
      pushToggleEl.classList.toggle('on', pushEnabled);
      pushToggleEl.textContent = pushEnabled ? 'Push: ON' : 'Push: OFF';
    }

    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - (base64String.length % 4)) % 4);
      const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const rawData = atob(base64);
      const outputArray = new Uint8Array(rawData.length);
      for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
      return outputArray;
    }

    async function enablePush() {
      if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
        addMsg('assistant', 'Push ei ole selles brauseris saadaval.');
        return false;
      }

      const permission = await Notification.requestPermission();
      if (permission !== 'granted') {
        addMsg('assistant', 'Push teavituste luba ei antud.');
        return false;
      }

      const code =
        prompt(
          'Pair code: kui .env-is on PUSH_PAIR_CODE, siis see lühike number; muidu kleebi terve JARVIS_BRIDGE_TOKEN.',
        ) || '';
      if (!code.trim()) return false;

      const keyRes = await fetch('/api/push/public-key');
      const keyData = await keyRes.json().catch(() => null);
      const publicKey = keyData?.publicKey;
      if (!publicKey) {
        addMsg('assistant', 'Push võtme päring ebaõnnestus.');
        return false;
      }

      const reg = await navigator.serviceWorker.register('/sw.js');
      // iOS/Safari can throw if a subscription already exists; reuse it when present.
      const existing = await reg.pushManager.getSubscription().catch(() => null);
      const sub =
        existing ||
        (await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(publicKey),
        }));

      const subscribeRes = await fetch('/api/push/subscribe', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-jarvis-pair-code': code.trim(),
        },
        body: JSON.stringify({ subscription: sub, code: code.trim() }),
      });

      if (!subscribeRes.ok) {
        const t = await subscribeRes.text().catch(() => '');
        addMsg('assistant', `Push subscribe ebaõnnestus (HTTP ${subscribeRes.status}). ${t}`.trim());
        return false;
      }

      pushEnabled = true;
      localStorage.setItem('jarvisPushEnabled', '1');
      updatePushToggleUi();
      addMsg('assistant', 'OK, push teavitused on sees.');
      return true;
    }

    async function disablePush() {
      pushEnabled = false;
      localStorage.setItem('jarvisPushEnabled', '0');
      updatePushToggleUi();
      addMsg('assistant', 'Push lülitatud välja (subscription jääb serverisse alles).');
      return true;
    }

    async function confirmPending() {
      if (!pendingRequestId) return;
      setLoading(true);
      try {
        const res = await fetch(`/api/debug/terminal-confirm/${encodeURIComponent(pendingRequestId)}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
        });
        if (!res.ok) {
          const t = await res.text().catch(() => '');
          addMsg('assistant', `Kinnitus ebaõnnestus (HTTP ${res.status}). ${t}`.trim());
        } else {
          addMsg('assistant', 'OK, kinnitasin. Jätkame.');
        }
      } catch {
        addMsg('assistant', 'Ühenduse viga. Proovi uuesti.');
      } finally {
        setLoading(false);
        await refreshPending();
      }
    }

    async function cancelPending() {
      if (!pendingRequestId) return;
      setLoading(true);
      try {
        const res = await fetch(`/api/debug/terminal-cancel/${encodeURIComponent(pendingRequestId)}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
        });
        if (!res.ok) {
          const t = await res.text().catch(() => '');
          addMsg('assistant', `Katkestus ebaõnnestus (HTTP ${res.status}). ${t}`.trim());
        } else {
          addMsg('assistant', 'OK, katkestasin ootel kinnituse.');
        }
      } catch {
        addMsg('assistant', 'Ühenduse viga. Proovi uuesti.');
      } finally {
        setLoading(false);
        await refreshPending();
      }
    }

    async function pingJarvisHealth() {
      if (!statusLineEl) return;
      try {
        const res = await fetch('/health', { cache: 'no-store' });
        const data = await res.json().catch(() => ({}));
        if (res.ok && data.status === 'ok') {
          statusLineEl.textContent = 'Jarvise assistent · ühendus OK';
          statusLineEl.classList.remove('bad');
          statusLineEl.classList.add('ok');
          return;
        }
        throw new Error('bad health');
      } catch {
        statusLineEl.textContent = 'Jarvise assistent · server ei vasta';
        statusLineEl.classList.remove('ok');
        statusLineEl.classList.add('bad');
      }
    }

    async function send() {
      hideReplyConfirm();
      const text = inputEl.value.trim();
      if (!text) return;

      // Quick "YES/continue" shortcut:
      // If the user types "ppp" we try to confirm a pending request (if any),
      // otherwise we fall back to normal chat send.
      if (text.toLowerCase() === 'ppp') {
        addMsg('user', text);
        inputEl.value = '';
        inputEl.style.height = 'auto';
        setLoading(true);

        try {
          await refreshPending();
          if (!pendingRequestId) {
            addMsg('assistant', 'Praegu ei ole ühtegi ootel kinnitust.');
          } else {
            await confirmPending();
          }
        } catch {
          addMsg('assistant', 'Ühenduse viga. Proovi uuesti.');
        } finally {
          setLoading(false);
          inputEl.focus();
        }

        return;
      }

      addMsg('user', text);
      inputEl.value = '';
      inputEl.style.height = 'auto';
      setLoading(true);

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          const errMsg =
            (data && data.error && data.error.message) ||
            data.message ||
            data.reply ||
            'Päring ebaõnnestus';
          addMsg('assistant', `Viga (HTTP ${res.status}): ${errMsg}`);
          hideReplyConfirm();
        } else {
          const reply = data.reply || data.error || 'Viga';
          addMsg('assistant', reply);
          showReplyConfirmIfNeeded(reply);
          history.push({ role: 'user', content: text });
          history.push({ role: 'assistant', content: reply });
          if (history.length > 20) history = history.slice(-20);
        }
      } catch {
        addMsg('assistant', 'Ühenduse viga. Proovi uuesti.');
        hideReplyConfirm();
      } finally {
        setLoading(false);
        inputEl.focus();
      }
    }

    if (replyConfirmYesEl) {
      replyConfirmYesEl.addEventListener('click', () => {
        inputEl.value =
          'Jah — palun kinnita ja tee see tegevus täielikult (kasuta vajadusel kalendri tööriistu delete_calendar_events või event_ids).';
        send();
      });
    }
    if (replyConfirmNoEl) {
      replyConfirmNoEl.addEventListener('click', () => {
        inputEl.value = 'Ei, ära tee seda tegevust.';
        send();
      });
    }

    if (voiceBtnEl) {
      let voiceLongTimer = null;
      const clearVoiceLong = () => {
        if (voiceLongTimer) {
          clearTimeout(voiceLongTimer);
          voiceLongTimer = null;
        }
      };
      voiceBtnEl.addEventListener('touchstart', () => {
        clearVoiceLong();
        voiceLongTimer = setTimeout(() => {
          voiceLongTimer = null;
          suppressVoiceClick = true;
          setTimeout(() => {
            suppressVoiceClick = false;
          }, 450);
          cycleSpeechLang();
          try {
            navigator.vibrate?.(15);
          } catch {}
        }, 650);
      }, { passive: true });
      voiceBtnEl.addEventListener('touchend', clearVoiceLong);
      voiceBtnEl.addEventListener('touchcancel', clearVoiceLong);
      voiceBtnEl.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        cycleSpeechLang();
      });
      voiceBtnEl.addEventListener('click', () => {
        if (suppressVoiceClick) return;
        if (voiceBtnEl.disabled) return;
        if (!speechRecognition) {
          addMsg(
            'assistant',
            'Häältuvastus ei ole selles brauseris toetatud (Chrome Android / Chrome töölaud töötab kõige paremini).',
          );
          return;
        }
        if (voiceBtnEl.classList.contains('listening')) {
          try {
            speechRecognition.stop();
          } catch {}
          return;
        }
        try {
          speechRecognition.lang = speechLang;
          voiceBtnEl.classList.add('listening');
          speechRecognition.start();
        } catch {
          voiceBtnEl.classList.remove('listening');
          addMsg('assistant', 'Mikrofoni ei saanud käivitada — kontrolli brauseri luba.');
        }
      });
    }

    sendBtn.addEventListener('click', send);
    confirmYesEl.addEventListener('click', confirmPending);
    confirmNoEl.addEventListener('click', cancelPending);
    if (soundToggleEl) {
      soundToggleEl.addEventListener('click', async () => {
        soundEnabled = !soundEnabled;
        localStorage.setItem('jarvisSoundEnabled', soundEnabled ? '1' : '0');
        updateSoundToggleUi();
        if (soundEnabled) {
          const ctx = ensureAudioContext();
          try { await ctx?.resume?.(); } catch {}
          playBeep();
          if (activeCalendarAlarm) startCalendarAlarmSoundLoop();
        }
      });
    }

    if (pushToggleEl) {
      pushToggleEl.addEventListener('click', async () => {
        try {
          if (pushEnabled) await disablePush();
          else await enablePush();
        } catch {
          addMsg('assistant', 'Push seadistamine ebaõnnestus.');
        }
      });
    }

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    inputEl.focus();
    pingJarvisHealth();
    setInterval(pingJarvisHealth, 45000);
    updateSoundToggleUi();
    updatePushToggleUi();
    refreshPending();
    setInterval(refreshPending, 2000);

    if (calAlarmYesEl) calAlarmYesEl.addEventListener('click', () => postCalendarAlarmAck('dismiss'));
    if (calAlarmNoEl) calAlarmNoEl.addEventListener('click', () => postCalendarAlarmAck('snooze'));

    refreshCalendarAlarms();
    setInterval(refreshCalendarAlarms, 12000);
  </script>
</body>
</html>
